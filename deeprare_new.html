<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>DeepRare · 诊断系统原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   DeepRare · Design Tokens
   ============================================================ */

:root {
  /* ---------- Brand · Indigo (沉稳蓝) ---------- */
  --brand-50:  #EEF3FC;
  --brand-100: #D9E3F6;
  --brand-200: #B4C6ED;
  --brand-300: #85A3DF;
  --brand-400: #5A7FCE;
  --brand-500: #3A60B8;   /* primary */
  --brand-600: #2B4C9D;
  --brand-700: #213C7E;
  --brand-800: #182D60;
  --brand-900: #0F1E40;

  /* ---------- Neutral · Ultra-clean ---------- */
  --n-0:  #FFFFFF;
  --n-25: #FFFFFF;
  --n-50: #F9FAFC;
  --n-100:#F2F4F7;
  --n-150:#E9ECF1;
  --n-200:#DCE0E6;
  --n-300:#BCC2CC;
  --n-400:#8F96A1;
  --n-500:#6F7681;
  --n-600:#52586A;
  --n-700:#353B47;
  --n-800:#21262F;
  --n-900:#121620;

  /* ---------- Semantic ---------- */
  --bg:          var(--n-0);
  --bg-sunken:   var(--n-50);
  --bg-surface:  var(--n-0);
  --bg-elevated: var(--n-0);
  --bg-hover:    #F4F8FE;
  --bg-selected: var(--brand-50);

  --border:      var(--n-150);
  --border-strong: var(--n-200);
  --border-subtle: var(--n-100);

  --text-1:      var(--n-900);
  --text-2:      var(--n-700);
  --text-3:      var(--n-500);
  --text-4:      var(--n-400);
  --text-inv:    var(--n-0);
  --text-link:   var(--brand-600);

  --accent:      var(--brand-500);
  --accent-hover:var(--brand-600);
  --accent-soft: var(--brand-50);

  /* ---------- Status (清晰临床色, 饱和度提升) ---------- */
  --ok-50:  #DCF3E3; --ok-500:  #189D4E; --ok-700: #0F6B34;
  --warn-50:#FDF0D0; --warn-500:#D98A0B; --warn-700:#8A5500;
  --err-50: #FBE1DF; --err-500: #D6342C; --err-700: #961C16;
  --info-50:#DCEBF7; --info-500:#1C7BC9; --info-700:#0F5389;
  --neutral-50:var(--n-100); --neutral-500:var(--n-500); --neutral-700:var(--n-700);

  /* ---------- ACMG · 新临床柔和色板 ---------- */
  /* P Pathogenic  · 红 */
  --acmg-p-bg:   #EFD6D3; --acmg-p-fg:  #8C2F2A; --acmg-p-bar:#E7C8C5;
  /* LP Likely Path · 橘 */
  --acmg-lp-bg:  #DCC4C2; --acmg-lp-fg: #7A2E28; --acmg-lp-bar:#CFAAA7;
  /* VUS · 暖石 (同色卡) */
  --acmg-vus-bg: #ECE7DA; --acmg-vus-fg:#6C5E3A; --acmg-vus-bar:#9A8854;
  /* LB Likely Ben · 青 */
  --acmg-lb-bg:  #D9E4E1; --acmg-lb-fg: #2F5C55; --acmg-lb-bar:#BCDED5;
  /* B Benign · 绿 */
  --acmg-b-bg:   #D9E7D5; --acmg-b-fg:  #2D5B36; --acmg-b-bar:#C8DEC2;

  /* ---------- Radius ---------- */
  --r-1: 2px;
  --r-2: 4px;
  --r-3: 6px;
  --r-4: 8px;
  --r-5: 12px;
  --r-pill: 999px;

  /* ---------- Shadow ---------- */
  --sh-1: 0 1px 0 rgba(20,25,34,.04), 0 1px 2px rgba(20,25,34,.04);
  --sh-2: 0 2px 4px rgba(20,25,34,.06), 0 1px 2px rgba(20,25,34,.04);
  --sh-3: 0 6px 16px -4px rgba(20,25,34,.10), 0 2px 4px rgba(20,25,34,.06);
  --sh-pop: 0 12px 32px -8px rgba(20,25,34,.18), 0 4px 10px rgba(20,25,34,.08);
  --sh-focus: 0 0 0 3px rgba(58,82,174,.22);

  /* ---------- Density (standard by default) ---------- */
  --row-h:       36px;
  --row-h-tight: 32px;
  --cell-px:     12px;
  --pad-1: 4px;
  --pad-2: 8px;
  --pad-3: 12px;
  --pad-4: 16px;
  --pad-5: 20px;
  --pad-6: 24px;
  --pad-8: 32px;

  /* ---------- Type ---------- */
  --font-sans: 'Inter', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  --fz-11: 11px;
  --fz-12: 12px;
  --fz-13: 13px;
  --fz-14: 14px;
  --fz-15: 15px;
  --fz-16: 16px;
  --fz-18: 18px;
  --fz-20: 20px;
  --fz-24: 24px;
  --fz-30: 30px;
  --fz-36: 36px;
  --fz-48: 48px;

  --lh-tight: 1.25;
  --lh-base:  1.5;
  --lh-loose: 1.65;
}

/* ---------- Density · Compact ---------- */
html[data-density="compact"] {
  --row-h:       30px;
  --row-h-tight: 26px;
  --cell-px:     10px;
  --pad-3: 10px;
  --pad-4: 12px;
  --pad-5: 16px;
  --pad-6: 20px;
}

/* ---------- Theme variants ---------- */
html[data-theme="teal"] {
  --brand-50:  #E4F2F1;
  --brand-100: #C6E2E0;
  --brand-200: #94C7C2;
  --brand-300: #5FA9A2;
  --brand-400: #3C8B84;
  --brand-500: #247068;
  --brand-600: #1A5A52;
  --brand-700: #124440;
  --brand-800: #0C322E;
  --brand-900: #07211F;
  --text-link:   var(--brand-600);
  --accent:      var(--brand-500);
  --accent-hover:var(--brand-600);
  --accent-soft: var(--brand-50);
  --bg-selected: var(--brand-50);
  --sh-focus: 0 0 0 3px rgba(36,112,104,.22);
}

html[data-theme="graphite"] {
  --brand-50:  #EEF0F2;
  --brand-100: #DDE0E4;
  --brand-200: #BBC1CA;
  --brand-300: #8E97A4;
  --brand-400: #5F6A7A;
  --brand-500: #3B4556;
  --brand-600: #2C3644;
  --brand-700: #212834;
  --brand-800: #171C26;
  --brand-900: #0D1118;
  --text-link:   #2C4196;
  --accent:      var(--brand-500);
  --accent-hover:var(--brand-600);
  --accent-soft: var(--brand-50);
  --bg-selected: #EEF1FA;
  --sh-focus: 0 0 0 3px rgba(59,69,86,.22);
}

html[data-theme="plum"] {
  --brand-50:  #F1EBF2;
  --brand-100: #E2D5E6;
  --brand-200: #C4ABCD;
  --brand-300: #9E7AAB;
  --brand-400: #7A5388;
  --brand-500: #5D3B6C;
  --brand-600: #4A2E58;
  --brand-700: #382343;
  --brand-800: #28182F;
  --brand-900: #180D1C;
  --text-link:   var(--brand-600);
  --accent:      var(--brand-500);
  --accent-hover:var(--brand-600);
  --accent-soft: var(--brand-50);
  --bg-selected: var(--brand-50);
  --sh-focus: 0 0 0 3px rgba(93,59,108,.22);
}

/* ============================================================
   DeepRare · Base
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

html {
  font-family: var(--font-sans);
  font-size: var(--fz-14);
  color: var(--text-1);
  background: var(--bg);
  font-feature-settings: "cv11", "ss01", "tnum";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  min-height: 100vh;
  font-size: var(--fz-14);
  line-height: var(--lh-base);
}

::selection { background: var(--brand-100); color: var(--brand-900); }

a { color: var(--text-link); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 2px; }

button { font-family: inherit; }

code, .mono, .tnum { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.tnum { font-variant-numeric: tabular-nums; }

hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 0;
}

/* ---- layout shell for the doc page ---- */
.doc {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 40px 120px;
}
.doc__head {
  padding: 56px 0 40px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 40px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 56px;
}
.doc__brand {
  display: flex; align-items: center; gap: 14px;
}
.doc__logo {
  width: 44px; height: 44px;
  border-radius: var(--r-3);
  background: var(--brand-500);
  display: grid; place-items: center;
  color: white;
  box-shadow: var(--sh-2);
  position: relative;
  overflow: hidden;
}
.doc__logo::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.18), transparent 60%);
}
.doc__title {
  font-size: var(--fz-30);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0;
  line-height: 1.1;
}
.doc__subtitle {
  color: var(--text-3);
  font-size: var(--fz-14);
  margin-top: 4px;
}
.doc__meta {
  display: flex; gap: 24px;
  font-size: var(--fz-12);
  color: var(--text-3);
}
.doc__meta b { color: var(--text-1); font-weight: 600; }

.doc__toc {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  margin-bottom: 56px;
  padding: 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-4);
}
.doc__toc a {
  display: block;
  padding: 8px 10px;
  border-radius: var(--r-2);
  font-size: var(--fz-12);
  color: var(--text-2);
  font-weight: 500;
  border: 1px solid transparent;
}
.doc__toc a:hover {
  background: var(--bg-hover);
  text-decoration: none;
  border-color: var(--border);
}
.doc__toc a small { color: var(--text-4); margin-right: 6px; font-variant-numeric: tabular-nums; }

.section {
  margin-bottom: 80px;
  scroll-margin-top: 24px;
}
.section__eyebrow {
  font-size: var(--fz-11);
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.section__title {
  font-size: var(--fz-24);
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 0 0 8px;
}
.section__desc {
  font-size: var(--fz-14);
  color: var(--text-3);
  max-width: 720px;
  margin: 0 0 28px;
  line-height: var(--lh-loose);
}
.section__head {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.sub {
  margin-top: 32px;
}
.sub__title {
  font-size: var(--fz-13);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-3);
  margin: 0 0 12px;
  display: flex; align-items: center; gap: 10px;
}
.sub__title::before {
  content: ""; width: 3px; height: 12px; background: var(--accent); border-radius: 2px;
}

/* ---- frame: boxed content block ---- */
.frame {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  padding: var(--pad-5);
}
.frame--flush { padding: 0; overflow: hidden; }
.frame--canvas {
  background:
    linear-gradient(var(--border-subtle) 1px, transparent 1px) 0 0 / 24px 24px,
    linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px) 0 0 / 24px 24px,
    var(--bg-surface);
  padding: 32px;
}

/* caption under samples */
.cap {
  font-size: var(--fz-11);
  color: var(--text-4);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 10px;
  display: flex; gap: 8px; align-items: center;
}
.cap code { font-size: var(--fz-11); background: var(--n-100); padding: 1px 6px; border-radius: var(--r-2); color: var(--text-2); text-transform: none; letter-spacing: 0; }

/* ============================================================
   DeepRare · Component styles
   ============================================================ */

/* ---------- Color swatch ---------- */
.swatch-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.swatch {
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  overflow: hidden;
  background: var(--bg-surface);
}
.swatch__chip {
  height: 72px;
  display: flex;
  align-items: flex-end;
  padding: 10px;
  color: rgba(255,255,255,.92);
  font-size: var(--fz-12);
  font-weight: 500;
}
.swatch__chip.is-light { color: rgba(20,25,34,.72); }
.swatch__body { padding: 10px 12px; display: flex; justify-content: space-between; font-size: var(--fz-12); }
.swatch__body .mono { color: var(--text-3); font-size: var(--fz-11); }

.scale {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  overflow: hidden;
}
.scale__step {
  height: 64px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 8px 10px;
  font-size: var(--fz-11);
  font-family: var(--font-mono);
  font-weight: 500;
  color: rgba(20,25,34,.7);
}
.scale__step.is-dark { color: rgba(255,255,255,.85); }
.scale__step small { opacity: .7; font-size: 10px; }

/* ---------- Typography spec ---------- */
.type-row {
  display: grid;
  grid-template-columns: 180px 1fr 260px;
  gap: 24px;
  padding: 20px 0;
  border-bottom: 1px dashed var(--border);
  align-items: baseline;
}
.type-row:last-child { border-bottom: none; }
.type-row__name { font-size: var(--fz-12); font-weight: 600; color: var(--text-2); }
.type-row__name small { display: block; color: var(--text-4); font-weight: 400; margin-top: 4px; letter-spacing: 0; text-transform: none; font-family: var(--font-mono); }
.type-row__sample { color: var(--text-1); }
.type-row__spec { font-family: var(--font-mono); font-size: var(--fz-11); color: var(--text-3); text-align: right; line-height: 1.7; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 32px;
  padding: 0 12px;
  border-radius: var(--r-3);
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-1);
  font-size: var(--fz-13);
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: background-color .12s, border-color .12s, color .12s, box-shadow .12s;
  white-space: nowrap;
  user-select: none;
}
.btn:focus-visible { outline: none; box-shadow: var(--sh-focus); }
.btn:disabled, .btn[aria-disabled="true"] { opacity: .45; cursor: not-allowed; }

.btn--primary { background: var(--accent); color: var(--text-inv); }
.btn--primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn--primary:active { background: var(--brand-700); }

.btn--secondary { border-color: var(--border-strong); background: var(--bg-surface); color: var(--text-1); }
.btn--secondary:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--n-300); }

.btn--ghost { color: var(--text-2); }
.btn--ghost:hover:not(:disabled) { background: var(--bg-hover); color: var(--text-1); }

.btn--danger { background: var(--err-500); color: var(--text-inv); }
.btn--danger:hover:not(:disabled) { background: var(--err-700); }

.btn--link { color: var(--text-link); height: auto; padding: 0; }
.btn--link:hover { text-decoration: underline; background: transparent; }

.btn--sm { height: 26px; padding: 0 8px; font-size: var(--fz-12); border-radius: var(--r-2); }
.btn--lg { height: 38px; padding: 0 16px; font-size: var(--fz-14); }
.btn--icon { width: 28px; height: 28px; padding: 0; }

.btn__kbd {
  margin-left: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 4px;
  border-radius: 2px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.24);
}
.btn--secondary .btn__kbd, .btn--ghost .btn__kbd { background: var(--n-100); border-color: var(--border); color: var(--text-3); }

/* ---------- Form controls ---------- */
.input, .select, .textarea {
  display: block;
  width: 100%;
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--border-strong);
  border-radius: var(--r-3);
  background: var(--bg-surface);
  color: var(--text-1);
  font-family: inherit;
  font-size: var(--fz-13);
  transition: border-color .12s, box-shadow .12s;
}
.input::placeholder, .textarea::placeholder { color: var(--text-4); }
.input:hover, .select:hover, .textarea:hover { border-color: var(--n-300); }
.input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: var(--sh-focus); }
.input[aria-invalid="true"] { border-color: var(--err-500); }
.input[aria-invalid="true"]:focus { box-shadow: 0 0 0 3px rgba(178,74,69,.22); }
.textarea { height: auto; min-height: 80px; padding: 8px 10px; line-height: 1.55; resize: vertical; }
.select { appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5L6 7.5L9 4.5' stroke='%236B7484' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; background-size: 12px; padding-right: 28px; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field__label { font-size: var(--fz-12); font-weight: 600; color: var(--text-2); display: flex; align-items: center; gap: 4px; }
.field__label .req { color: var(--err-500); }
.field__hint { font-size: var(--fz-11); color: var(--text-4); }
.field__error { font-size: var(--fz-11); color: var(--err-500); }

/* inline icon in input */
.input-wrap { position: relative; }
.input-wrap .input { padding-left: 30px; }
.input-wrap__icon {
  position: absolute; left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-4);
  pointer-events: none;
  display: grid; place-items: center;
}

/* checkbox, radio */
.check, .radio {
  appearance: none;
  width: 14px; height: 14px;
  border: 1.5px solid var(--n-300);
  background: var(--bg-surface);
  display: inline-grid; place-items: center;
  cursor: pointer;
  transition: background .12s, border-color .12s;
  vertical-align: -2px;
}
.check { border-radius: 3px; }
.radio { border-radius: 50%; }
.check:checked, .radio:checked { background: var(--accent); border-color: var(--accent); }
.check:checked::after { content: ""; width: 7px; height: 3px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: translateY(-1px) rotate(-45deg); }
.radio:checked::after { content: ""; width: 5px; height: 5px; background: #fff; border-radius: 50%; }
.check:focus-visible, .radio:focus-visible { outline: none; box-shadow: var(--sh-focus); }

/* switch */
.switch { position: relative; width: 28px; height: 16px; background: var(--n-200); border-radius: 999px; display: inline-block; transition: background .15s; cursor: pointer; vertical-align: -3px; }
.switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: #fff; box-shadow: var(--sh-1); transition: left .15s; }
.switch.is-on { background: var(--accent); }
.switch.is-on::after { left: 14px; }

/* segmented / tabs */
.segmented {
  display: inline-flex;
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  padding: 2px;
  gap: 2px;
}
.segmented__item {
  padding: 4px 12px;
  font-size: var(--fz-12);
  font-weight: 500;
  color: var(--text-2);
  border-radius: 4px;
  cursor: pointer;
  border: none;
  background: transparent;
  transition: background .12s;
}
.segmented__item:hover { color: var(--text-1); }
.segmented__item.is-active { background: var(--bg-surface); color: var(--text-1); box-shadow: var(--sh-1); }

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  gap: 0;
}
.tabs__item {
  padding: 10px 16px;
  font-size: var(--fz-13);
  font-weight: 500;
  color: var(--text-3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  border-top: none; border-left: none; border-right: none;
  background: transparent;
  transition: color .12s, border-color .12s;
  display: inline-flex; align-items: center; gap: 6px;
}
.tabs__item:hover { color: var(--text-1); }
.tabs__item.is-active { color: var(--accent); border-bottom-color: var(--accent); }
.tabs__item .count {
  font-size: var(--fz-11);
  padding: 0 5px;
  border-radius: var(--r-pill);
  background: var(--n-100);
  color: var(--text-3);
}
.tabs__item.is-active .count { background: var(--accent-soft); color: var(--accent); }

/* ---------- Badges ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  height: 20px;
  padding: 0 7px;
  border-radius: var(--r-2);
  font-size: var(--fz-11);
  font-weight: 600;
  letter-spacing: 0.01em;
  line-height: 1;
  background: var(--n-100);
  color: var(--text-2);
  border: 1px solid transparent;
  white-space: nowrap;
}
.badge--pill { border-radius: var(--r-pill); padding: 0 10px; }
.badge--soft-brand { background: var(--accent-soft); color: var(--brand-700); }
.badge--soft-ok    { background: var(--ok-50);    color: var(--ok-700); }
.badge--soft-warn  { background: var(--warn-50);  color: var(--warn-700); }
.badge--soft-err   { background: var(--err-50);   color: var(--err-700); }
.badge--soft-info  { background: var(--info-50);  color: var(--info-700); }

.badge--outline { background: transparent; border-color: var(--border-strong); color: var(--text-2); }
.badge--dot::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .75; }

/* ACMG badges (monospace, uppercase) */
.acmg {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 36px;
  height: 20px;
  padding: 0 6px;
  border-radius: var(--r-2);
  font-family: var(--font-mono);
  font-size: var(--fz-11);
  font-weight: 700;
  letter-spacing: 0.04em;
  line-height: 1;
  border: 1px solid transparent;
}
.acmg--p   { background: var(--acmg-p-bg);   color: var(--acmg-p-fg); }
.acmg--lp  { background: var(--acmg-lp-bg);  color: var(--acmg-lp-fg); }
.acmg--vus { background: var(--acmg-vus-bg); color: var(--acmg-vus-fg); }
.acmg--lb  { background: var(--acmg-lb-bg);  color: var(--acmg-lb-fg); }
.acmg--b   { background: var(--acmg-b-bg);   color: var(--acmg-b-fg); }

/* HPO tag */
.hpo {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 22px;
  padding: 0 4px 0 8px;
  background: var(--accent-soft);
  color: var(--brand-700);
  border: 1px solid var(--brand-100);
  border-radius: var(--r-2);
  font-size: var(--fz-12);
  font-weight: 500;
  max-width: 260px;
}
.hpo__id {
  font-family: var(--font-mono);
  font-size: var(--fz-11);
  color: var(--brand-600);
  opacity: .78;
}
.hpo__label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hpo__x {
  display: grid; place-items: center;
  width: 16px; height: 16px;
  margin-left: 2px;
  border-radius: 3px;
  color: var(--brand-600);
  cursor: pointer;
  opacity: .6;
}
.hpo__x:hover { opacity: 1; background: var(--brand-100); }
.hpo--neg { background: var(--n-50); color: var(--text-2); border-color: var(--border); }
.hpo--neg .hpo__id, .hpo--neg .hpo__x { color: var(--text-3); }
.hpo--neg::before { content: "¬"; font-weight: 700; color: var(--err-500); margin-right: -2px; }

/* ---------- Status dot / indicators ---------- */
.status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: var(--fz-12);
  font-weight: 500;
  color: var(--text-2);
}
.status__dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--n-300);
  flex-shrink: 0;
}
.status--running .status__dot { background: var(--info-500); position: relative; }
.status--running .status__dot::after {
  content: ""; position: absolute; inset: -3px; border-radius: 50%;
  border: 2px solid var(--info-500); opacity: .4;
  animation: pulse-ring 1.6s ease-out infinite;
}
.status--ok   .status__dot { background: var(--ok-500); }
.status--warn .status__dot { background: var(--warn-500); }
.status--err  .status__dot { background: var(--err-500); }
.status--queue .status__dot { background: var(--n-400); }
.status--done .status__dot { background: var(--ok-500); }

@keyframes pulse-ring {
  0%   { transform: scale(.6); opacity: .8; }
  80%  { transform: scale(1.6); opacity: 0; }
  100% { transform: scale(1.6); opacity: 0; }
}

/* spinner */
.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--n-200);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  display: inline-block;
  vertical-align: -2px;
}
.spinner--lg { width: 20px; height: 20px; border-width: 2.5px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- Progress bar ---------- */
.progress {
  position: relative;
  height: 6px;
  background: var(--n-100);
  border-radius: var(--r-pill);
  overflow: hidden;
}
.progress__fill {
  position: absolute; inset: 0 auto 0 0;
  background: var(--accent);
  border-radius: inherit;
  transition: width .3s ease;
}
.progress--ok .progress__fill   { background: var(--ok-500); }
.progress--warn .progress__fill { background: var(--warn-500); }
.progress--err .progress__fill  { background: var(--err-500); }
.progress--sm { height: 4px; }
.progress--lg { height: 10px; }
.progress--striped .progress__fill {
  background-image: linear-gradient(
    45deg,
    rgba(255,255,255,.18) 25%, transparent 25%,
    transparent 50%, rgba(255,255,255,.18) 50%,
    rgba(255,255,255,.18) 75%, transparent 75%, transparent);
  background-size: 12px 12px;
  animation: stripes 1.2s linear infinite;
}
@keyframes stripes { to { background-position: 12px 0; } }

/* match bar (row inline) */
.match-bar {
  display: flex; align-items: center; gap: 8px;
  font-variant-numeric: tabular-nums;
}
.match-bar__track { flex: 1; height: 4px; background: var(--n-100); border-radius: var(--r-pill); overflow: hidden; min-width: 80px; }
.match-bar__fill  { height: 100%; background: var(--accent); border-radius: inherit; }
.match-bar__val   { font-size: var(--fz-12); font-weight: 600; color: var(--text-1); min-width: 40px; text-align: right; font-family: var(--font-mono); }

/* ---------- Stepper ---------- */
.stepper {
  display: flex;
  gap: 0;
}
.stepper__item {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  padding-right: 24px;
}
.stepper__item:last-child { padding-right: 0; flex: 0 0 auto; }
.stepper__bar {
  height: 3px;
  background: var(--n-150);
  border-radius: 2px;
  position: relative;
}
.stepper__bar::after {
  content: "";
  position: absolute; inset: 0 auto 0 0;
  background: var(--accent);
  border-radius: inherit;
  width: 0%;
  transition: width .3s;
}
.stepper__item.is-done .stepper__bar::after { width: 100%; }
.stepper__item.is-active .stepper__bar::after { width: 60%; background: var(--accent); }
.stepper__item.is-active .stepper__bar { background: var(--accent-soft); }
.stepper__label {
  display: flex; gap: 8px; align-items: center;
  font-size: var(--fz-12);
  font-weight: 500;
  color: var(--text-3);
}
.stepper__item.is-done .stepper__label { color: var(--text-2); }
.stepper__item.is-active .stepper__label { color: var(--accent); font-weight: 600; }
.stepper__num {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--n-150); color: var(--text-3);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
  font-family: var(--font-mono);
}
.stepper__item.is-done .stepper__num { background: var(--ok-500); color: #fff; }
.stepper__item.is-active .stepper__num { background: var(--accent); color: #fff; }
.stepper__meta { font-size: var(--fz-11); color: var(--text-4); margin-left: 26px; font-family: var(--font-mono); }

/* ---------- Chat bubbles ---------- */
.chat { display: flex; flex-direction: column; gap: 14px; }
.chat__msg { display: flex; gap: 10px; max-width: 90%; }
.chat__msg--ai { align-self: flex-start; }
.chat__msg--user { align-self: flex-end; flex-direction: row-reverse; }
.chat__avatar {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: var(--r-3);
  display: grid; place-items: center;
  font-size: 11px;
  font-weight: 700;
}
.chat__avatar--ai { background: var(--accent); color: #fff; }
.chat__avatar--user { background: var(--n-100); color: var(--text-2); border: 1px solid var(--border); }
.chat__bubble {
  padding: 8px 12px;
  border-radius: var(--r-4);
  font-size: var(--fz-13);
  line-height: 1.55;
  background: var(--bg-sunken);
  color: var(--text-1);
  border: 1px solid var(--border-subtle);
}
.chat__msg--ai .chat__bubble { border-top-left-radius: 2px; }
.chat__msg--user .chat__bubble {
  border-top-right-radius: 2px;
  background: var(--accent-soft);
  color: var(--brand-800);
  border-color: var(--brand-100);
}
.chat__bubble .refs { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
.chat__bubble .cite-sup {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  cursor: pointer;
  vertical-align: super;
  margin-left: 2px;
  text-decoration: none;
  border-bottom: 1px dotted var(--accent);
}

.chat__choices { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.chat__choice {
  padding: 4px 10px;
  font-size: var(--fz-12);
  background: var(--bg-surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-pill);
  color: var(--text-2);
  cursor: pointer;
  transition: all .12s;
}
.chat__choice:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

/* ---------- Timeline ---------- */
.tl { position: relative; padding-left: 16px; }
.tl::before {
  content: ""; position: absolute; left: 5px; top: 4px; bottom: 4px;
  width: 1.5px; background: var(--border-strong); border-radius: 1px;
}
.tl__item { position: relative; padding: 4px 0 14px; }
.tl__item::before {
  content: ""; position: absolute; left: -16px; top: 7px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--bg-surface);
  border: 2px solid var(--n-300);
}
.tl__item.is-current::before { border-color: var(--accent); background: var(--accent); }
.tl__item.is-past::before { border-color: var(--n-300); background: var(--n-300); }
.tl__date { font-size: var(--fz-11); font-family: var(--font-mono); color: var(--text-4); margin-bottom: 2px; }
.tl__title { font-size: var(--fz-13); font-weight: 500; color: var(--text-1); margin-bottom: 2px; }
.tl__meta { font-size: var(--fz-12); color: var(--text-3); }

/* ---------- Tables ---------- */
.tbl {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: var(--fz-13);
}
.tbl th, .tbl td {
  padding: 0 var(--cell-px);
  height: var(--row-h);
  text-align: left;
  vertical-align: middle;
  border-bottom: 1px solid var(--border-subtle);
  line-height: 1.3;
}
.tbl th {
  background: var(--n-0);
  color: var(--text-3);
  font-weight: 600;
  font-size: var(--fz-11);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  position: sticky; top: 0; z-index: 1;
}
.tbl th.is-sort { cursor: pointer; user-select: none; }
.tbl th.is-sort::after {
  content: "↕"; opacity: .4; margin-left: 4px; font-size: 10px;
}
.tbl th.is-asc::after { content: "↑"; opacity: 1; color: var(--accent); }
.tbl th.is-desc::after { content: "↓"; opacity: 1; color: var(--accent); }
.tbl tbody tr { background: var(--bg-surface); }
.tbl tbody tr:hover { background: var(--bg-hover); }
.tbl tbody tr.is-selected { background: var(--bg-selected); }
.tbl tbody tr.is-selected td { border-bottom-color: var(--brand-100); }
.tbl tbody tr:last-child td { border-bottom: none; }

.tbl td.num, .tbl th.num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
.tbl td.mono { font-family: var(--font-mono); font-size: var(--fz-12); }

/* left accent bar on selected / primary rows */
.tbl tr.has-accent td:first-child { position: relative; padding-left: 16px; }
.tbl tr.has-accent td:first-child::before {
  content: ""; position: absolute; left: 0; top: 4px; bottom: 4px;
  width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
}
.tbl tr.has-accent--p   td:first-child::before { background: var(--acmg-p-bar); }
.tbl tr.has-accent--lp  td:first-child::before { background: var(--acmg-lp-bar); }
.tbl tr.has-accent--vus td:first-child::before { background: var(--acmg-vus-bar); }
.tbl tr.has-accent--lb  td:first-child::before { background: var(--acmg-lb-bar); }
.tbl tr.has-accent--b   td:first-child::before { background: var(--acmg-b-bar); }

/* zebra option */
.tbl--zebra tbody tr:nth-child(odd) { background: var(--bg-surface); }
.tbl--zebra tbody tr:nth-child(even) { background: var(--n-25); }
.tbl--zebra tbody tr:hover { background: var(--bg-hover); }

/* expandable row */
.tbl .expander {
  display: inline-grid; place-items: center;
  width: 18px; height: 18px;
  border-radius: 3px;
  color: var(--text-3);
  cursor: pointer;
  transition: transform .15s, background .12s;
}
.tbl .expander:hover { background: var(--n-100); color: var(--text-1); }
.tbl tr.is-expanded .expander { transform: rotate(90deg); color: var(--accent); }

.tbl tr.row-detail > td {
  background: var(--bg-sunken);
  padding: 16px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

/* rank cell */
.rank {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: var(--r-2);
  font-family: var(--font-mono); font-weight: 700; font-size: var(--fz-12);
  background: var(--n-100); color: var(--text-2);
}
.rank--1 { background: var(--accent); color: #fff; }
.rank--2 { background: var(--brand-100); color: var(--brand-700); }
.rank--3 { background: var(--brand-50); color: var(--brand-600); }

/* confidence chip */
.conf {
  display: inline-flex; align-items: center; gap: 6px;
  font-variant-numeric: tabular-nums;
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: var(--fz-12);
}
.conf__bar {
  width: 56px; height: 5px; border-radius: var(--r-pill);
  background: var(--n-100);
  overflow: hidden;
}
.conf__fill { height: 100%; background: var(--accent); }
.conf--high .conf__fill { background: var(--ok-500); }
.conf--mid  .conf__fill { background: var(--warn-500); }
.conf--low  .conf__fill { background: var(--err-500); }

/* ---------- Cards (sparingly) ---------- */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  overflow: hidden;
}
.card__head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.card__title { font-size: var(--fz-13); font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px; }
.card__body { padding: 16px; }

/* ---------- Alert ---------- */
.alert {
  display: flex; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--r-3);
  border: 1px solid var(--border);
  background: var(--bg-surface);
  font-size: var(--fz-13);
  align-items: flex-start;
  border-left-width: 3px;
}
.alert__icon { flex-shrink: 0; padding-top: 1px; }
.alert__body { flex: 1; }
.alert__title { font-weight: 600; margin-bottom: 2px; }
.alert__desc { color: var(--text-2); font-size: var(--fz-12); line-height: 1.55; }
.alert--info  { background: var(--info-50); border-color: #AFCEE8; border-left-color: var(--info-500); }
.alert--ok    { background: var(--ok-50);   border-color: #A8D9B7; border-left-color: var(--ok-500); }
.alert--warn  { background: var(--warn-50); border-color: #EAC477; border-left-color: var(--warn-500); }
.alert--err   { background: var(--err-50);  border-color: #EEB4B0; border-left-color: var(--err-500); }

/* ---------- Dialog (danger confirm) ---------- */
.dialog {
  background: var(--bg-elevated);
  border-radius: var(--r-5);
  box-shadow: var(--sh-pop);
  border: 1px solid var(--border);
  width: 440px;
  overflow: hidden;
}
.dialog__head {
  padding: 16px 20px 8px;
  display: flex; gap: 12px;
}
.dialog__icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--err-50);
  color: var(--err-500);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.dialog__title { font-size: var(--fz-15); font-weight: 600; margin: 2px 0 4px; }
.dialog__desc { font-size: var(--fz-13); color: var(--text-2); line-height: 1.6; }
.dialog__confirm-field {
  padding: 8px 20px 0;
  font-size: var(--fz-12);
  color: var(--text-3);
}
.dialog__confirm-field code { background: var(--n-100); padding: 1px 6px; border-radius: 3px; font-weight: 600; color: var(--err-700); }
.dialog__body { padding: 12px 20px 0; }
.dialog__foot {
  padding: 16px 20px;
  display: flex; justify-content: flex-end; gap: 8px;
  background: var(--bg-sunken);
  border-top: 1px solid var(--border);
  margin-top: 20px;
}

/* ---------- Spacing & Radius spec ---------- */
.space-row { display: flex; align-items: center; gap: 16px; padding: 8px 0; border-bottom: 1px dashed var(--border); }
.space-row:last-child { border-bottom: none; }
.space-row__label { width: 80px; font-family: var(--font-mono); font-size: var(--fz-12); color: var(--text-2); }
.space-row__visual { background: var(--accent-soft); border: 1px solid var(--brand-100); height: 16px; border-radius: 2px; }
.space-row__value { font-family: var(--font-mono); font-size: var(--fz-11); color: var(--text-4); margin-left: auto; }

.radii { display: flex; gap: 24px; }
.radii__item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.radii__sample { width: 64px; height: 64px; background: var(--accent-soft); border: 1.5px solid var(--brand-200); }
.radii__label { font-size: var(--fz-11); font-family: var(--font-mono); color: var(--text-3); text-align: center; }
.radii__label b { display: block; color: var(--text-1); font-weight: 600; font-family: var(--font-sans); font-size: var(--fz-12); }

/* ---------- Density toolbar (sticky) ---------- */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(250,251,252,.85);
  backdrop-filter: saturate(180%) blur(10px);
  -webkit-backdrop-filter: saturate(180%) blur(10px);
  border-bottom: 1px solid var(--border);
  margin: 0 -40px 32px;
  padding: 10px 40px;
  display: flex; align-items: center; gap: 16px;
  font-size: var(--fz-12);
}
.toolbar .label { color: var(--text-3); font-weight: 500; margin-right: 4px; }
.toolbar__spacer { flex: 1; }

/* ---------- Two-column layout for section bodies ---------- */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.flex { display: flex; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-6 { gap: 24px; }
.wrap { flex-wrap: wrap; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.justify-between { justify-content: space-between; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-6 { margin-top: 24px; }
.mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }

.t-xs { font-size: var(--fz-11); } .t-sm { font-size: var(--fz-12); } .t-md { font-size: var(--fz-13); } .t-lg { font-size: var(--fz-15); }
.t-2 { color: var(--text-2); } .t-3 { color: var(--text-3); } .t-4 { color: var(--text-4); }
.t-brand { color: var(--accent); }
.fw-5 { font-weight: 500; } .fw-6 { font-weight: 600; } .fw-7 { font-weight: 700; }

/* ============================================================
   DeepRare · Scene preview styles
   ============================================================ */

.scene {
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  overflow: hidden;
  background: var(--bg-surface);
}

/* app chrome */
.app {
  display: grid;
  grid-template-rows: 48px 1fr;
  background: var(--n-0);
  height: 720px;
}
.app__bar {
  display: flex; align-items: center;
  padding: 0 16px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.app__logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: var(--fz-14);
  letter-spacing: -0.01em;
}
.app__logo-mark {
  width: 22px; height: 22px;
  border-radius: var(--r-2);
  background: var(--accent);
  display: grid; place-items: center;
  color: #fff;
}
.app__nav { display: flex; gap: 2px; margin-left: 16px; }
.app__nav a {
  padding: 6px 10px;
  font-size: var(--fz-13);
  color: var(--text-2);
  border-radius: var(--r-2);
  font-weight: 500;
}
.app__nav a.is-active { background: var(--accent-soft); color: var(--accent); }
.app__nav a:hover { background: var(--bg-hover); text-decoration: none; }
.app__right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.app__avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, var(--brand-400), var(--brand-600));
  color: #fff; font-size: 11px; font-weight: 600;
  display: grid; place-items: center;
}
.app__body { display: grid; grid-template-columns: auto 1fr; min-height: 0; background: var(--n-0); }
.app__side {
  width: 220px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  padding: 12px 10px;
  display: flex; flex-direction: column; gap: 2px;
  overflow-y: auto;
}
.app__side-group {
  font-size: var(--fz-11);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-4);
  padding: 10px 10px 6px;
  font-weight: 600;
}
.app__side a {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  font-size: var(--fz-13);
  color: var(--text-2);
  border-radius: var(--r-2);
  font-weight: 500;
}
.app__side a .count { margin-left: auto; font-size: var(--fz-11); color: var(--text-4); font-family: var(--font-mono); }
.app__side a.is-active { background: var(--accent-soft); color: var(--accent); }
.app__side a:hover { background: var(--bg-hover); text-decoration: none; }
.app__main { min-width: 0; overflow: auto; display: flex; flex-direction: column; }
.app__page-head {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.app__page-title { font-size: var(--fz-18); font-weight: 700; margin: 0; letter-spacing: -0.01em; }
.app__page-crumbs { font-size: var(--fz-12); color: var(--text-4); margin-bottom: 4px; }
.app__page-crumbs a { color: var(--text-3); }
.app__toolbar {
  padding: 10px 24px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 10px; align-items: center;
}
.app__content { padding: 20px 24px; flex: 1; min-height: 0; }
.app__content--flush { padding: 0; }

/* patient detail two-pane */
.detail {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  height: 100%;
}
.detail__left {
  border-right: 1px solid var(--border);
  background: var(--bg-surface);
  overflow-y: auto;
  padding: 16px;
}
.detail__right {
  overflow-y: auto;
  padding: 20px 24px;
  background: var(--n-0);
}

.patient-id {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.patient-id__avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--brand-100); color: var(--brand-700);
  display: grid; place-items: center;
  font-weight: 600; font-size: var(--fz-14);
}
.patient-id__name { font-size: var(--fz-14); font-weight: 600; }
.patient-id__meta { font-size: var(--fz-11); color: var(--text-3); font-family: var(--font-mono); }

.kv { display: grid; grid-template-columns: 72px 1fr; gap: 4px 10px; font-size: var(--fz-12); }
.kv dt { color: var(--text-4); }
.kv dd { margin: 0; color: var(--text-1); }

.split-pane {
  display: grid;
  grid-template-rows: 1fr auto;
  height: 100%;
}

/* conversation area */
.convo {
  padding: 16px 8px;
  display: flex; flex-direction: column; gap: 14px;
  overflow-y: auto;
}

/* composer */
.composer {
  border: 1px solid var(--border-strong);
  border-radius: var(--r-4);
  padding: 8px 10px;
  background: var(--bg-surface);
  display: flex; flex-direction: column; gap: 8px;
}
.composer__chips { display: flex; gap: 6px; flex-wrap: wrap; }
.composer__row { display: flex; gap: 8px; align-items: flex-end; }
.composer__input {
  flex: 1;
  border: none;
  resize: none;
  outline: none;
  font-family: inherit;
  font-size: var(--fz-13);
  background: transparent;
  padding: 4px 0;
  line-height: 1.5;
  min-height: 32px;
  max-height: 120px;
}
.composer__tools { display: flex; gap: 4px; align-items: center; color: var(--text-4); }

/* upload zone */
.upload {
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--r-4);
  padding: 28px;
  text-align: center;
  background: var(--bg-sunken);
  color: var(--text-3);
  cursor: pointer;
  transition: background .12s, border-color .12s;
}
.upload:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.upload__icon { margin-bottom: 8px; color: var(--text-4); }
.upload__title { font-weight: 600; color: var(--text-1); font-size: var(--fz-14); margin-bottom: 4px; }
.upload__hint { font-size: var(--fz-12); }

/* ranked disease row expanded detail */
.detail-expand {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 20px;
}
.detail-expand__section { margin-bottom: 14px; }
.detail-expand__section:last-child { margin-bottom: 0; }
.detail-expand__h {
  font-size: var(--fz-11);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-3);
  margin: 0 0 8px;
}

.cmp-table th, .cmp-table td { border-left: 1px solid var(--border-subtle); }
.cmp-table th:first-child, .cmp-table td:first-child { border-left: none; }

/* VCF variant detail expand */
.acmg-crits {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.acmg-crit {
  padding: 6px 8px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  font-size: var(--fz-11);
  display: flex; justify-content: space-between; gap: 6px;
}
.acmg-crit b { font-family: var(--font-mono); color: var(--acmg-p-fg); font-weight: 600; }
.acmg-crit.is-benign b { color: var(--acmg-b-fg); }
.acmg-crit small { color: var(--text-4); font-size: 10px; }

/* big KPI */
.kpi {
  display: flex; flex-direction: column; gap: 4px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  background: var(--bg-surface);
}
.kpi__label { font-size: var(--fz-11); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
.kpi__val { font-size: var(--fz-24); font-weight: 700; font-family: var(--font-mono); letter-spacing: -0.02em; line-height: 1.1; }
.kpi__sub { font-size: var(--fz-11); color: var(--text-4); font-family: var(--font-mono); }
.kpi--accent .kpi__val { color: var(--accent); }

/* vcf step card */
.vcf-steps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.vcf-step {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  background: var(--bg-surface);
  display: flex; flex-direction: column; gap: 4px;
  position: relative;
  font-size: var(--fz-12);
}
.vcf-step::before {
  content: "";
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--n-150); border-radius: 3px 0 0 3px;
}
.vcf-step.is-done::before { background: var(--ok-500); }
.vcf-step.is-running::before { background: var(--accent); }
.vcf-step__name { font-weight: 600; display: flex; align-items: center; gap: 6px; font-size: var(--fz-12); }
.vcf-step__val { font-family: var(--font-mono); font-size: var(--fz-18); font-weight: 600; letter-spacing: -0.01em; margin-top: 2px; }
.vcf-step__meta { font-size: var(--fz-11); color: var(--text-4); font-family: var(--font-mono); }

/* dialog backdrop */
.backdrop {
  position: relative;
  padding: 32px;
  background:
    repeating-linear-gradient(135deg, rgba(20,25,34,.04) 0 1px, transparent 1px 10px),
    var(--n-100);
  border-radius: var(--r-4);
  display: grid; place-items: center;
}

/* HPO match row */
.hpo-match { display: grid; grid-template-columns: 1fr 70px 18px 110px; gap: 8px; align-items: center; font-size: var(--fz-12); padding: 4px 0; border-bottom: 1px dashed var(--border-subtle); }
.hpo-match:last-child { border-bottom: none; }
.hpo-match__id { font-family: var(--font-mono); color: var(--text-3); font-size: var(--fz-11); }
.hpo-match__arrow { color: var(--text-4); text-align: center; }

/* footer */
.ds-foot {
  margin-top: 120px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between;
  color: var(--text-4);
  font-size: var(--fz-12);
}

/* tweaks panel */
.tweaks-panel {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 260px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  box-shadow: var(--sh-pop);
  padding: 14px;
  z-index: 100;
  font-size: var(--fz-12);
}
.tweaks-panel__title { font-weight: 600; font-size: var(--fz-13); margin: 0 0 10px; display: flex; align-items: center; justify-content: space-between; }
.tweaks-panel__row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
.tweaks-panel__label { color: var(--text-2); }
.theme-swatches { display: flex; gap: 6px; }
.theme-swatch {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  position: relative;
}
.theme-swatch.is-active { border-color: var(--text-1); }
.theme-swatch[data-t="indigo"]   { background: #3A52AE; }
.theme-swatch[data-t="teal"]     { background: #247068; }
.theme-swatch[data-t="graphite"] { background: #3B4556; }
.theme-swatch[data-t="plum"]     { background: #5D3B6C; }

/* ============================================================
   DeepRare · Prototype app-specific styles
   ============================================================ */

html, body, #root { height: 100%; }
body { background: var(--bg-sunken); }

/* full-viewport app shell */
.shell {
  display: grid;
  grid-template-rows: 52px 1fr;
  height: 100vh;
  background: var(--n-0);
}
.shell__bar {
  display: flex; align-items: center;
  padding: 0 20px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  gap: 20px;
}
.shell__logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: var(--fz-14);
  letter-spacing: -0.01em;
}
.shell__logo-mark {
  width: 24px; height: 24px;
  border-radius: var(--r-2);
  background: var(--accent);
  display: grid; place-items: center;
  color: #fff;
  position: relative; overflow: hidden;
}
.shell__logo-mark::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.22), transparent 60%);
}
.shell__logo-tag {
  font-size: 10px; font-weight: 600;
  color: var(--text-4);
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  margin-left: 2px;
  letter-spacing: 0.04em;
}
.shell__nav { display: flex; gap: 2px; margin-left: 10px; }
.shell__nav button {
  padding: 6px 12px;
  font-size: var(--fz-13);
  color: var(--text-2);
  background: transparent;
  border: none;
  border-radius: var(--r-2);
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  display: inline-flex; align-items: center; gap: 6px;
}
.shell__nav button.is-active { background: var(--accent-soft); color: var(--accent); }
.shell__nav button:hover { background: var(--bg-hover); }
.shell__right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.shell__avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--brand-400), var(--brand-600));
  color: #fff; font-size: 11px; font-weight: 600;
  display: grid; place-items: center;
}
.shell__content { overflow: auto; min-height: 0; background: var(--n-0); }

/* --- Page: page heading area --- */
.page-head {
  padding: 20px 32px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 20px;
}
.page-head h1 { font-size: var(--fz-20); font-weight: 700; margin: 0 0 2px; letter-spacing: -0.01em; }
.page-head .crumbs { font-size: var(--fz-12); color: var(--text-4); margin-bottom: 4px; }
.page-head .crumbs a { color: var(--text-3); cursor: pointer; }
.page-head .desc { font-size: var(--fz-12); color: var(--text-3); margin-top: 4px; }
.page-head--compact { padding: 12px 32px 12px; }
.page-head--compact h1 { font-size: var(--fz-16); margin: 0; }
.page-head--compact .desc { font-size: var(--fz-12); margin-top: 2px; }

.page-body { padding: 24px 32px 40px; }

/* --- New-diagnosis page layout --- */
.newdiag {
  max-width: 1080px;
  margin: 0 auto;
}
.newdiag__intro {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px;
}
.newdiag__intro-mark {
  width: 44px; height: 44px;
  border-radius: var(--r-4);
  background: var(--accent-soft);
  color: var(--accent);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.newdiag__card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  overflow: hidden;
}
.newdiag__tabs {
  display: flex;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-sunken);
  gap: 0;
}
.newdiag__tab {
  padding: 14px 18px 12px;
  background: transparent; border: none;
  font-size: var(--fz-13);
  font-weight: 500;
  color: var(--text-3);
  cursor: pointer;
  font-family: inherit;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: inline-flex; align-items: center; gap: 8px;
}
.newdiag__tab.is-active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg-surface); }
.newdiag__tab .muted { color: var(--text-4); font-weight: 400; font-size: var(--fz-12); }

.newdiag__section {
  padding: 20px 22px;
  border-bottom: 1px solid var(--border);
}
.newdiag__section:last-child { border-bottom: none; }
.newdiag__section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.newdiag__section-title {
  font-size: var(--fz-13);
  font-weight: 600;
  color: var(--text-1);
  display: inline-flex; align-items: center; gap: 8px;
}
.newdiag__section-title .n {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-mono);
  display: grid; place-items: center;
}
.newdiag__section-hint { font-size: var(--fz-12); color: var(--text-4); }

/* patient search combo */
.p-search {
  position: relative;
}
.p-search__drop {
  position: absolute;
  top: calc(100% + 4px); left: 0; right: 0;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  box-shadow: var(--sh-pop);
  max-height: 260px; overflow-y: auto;
  z-index: 30;
  padding: 4px;
}
.p-search__item {
  padding: 8px 10px;
  border-radius: var(--r-2);
  cursor: pointer;
  display: flex; gap: 10px; align-items: center;
  font-size: var(--fz-13);
}
.p-search__item:hover { background: var(--bg-hover); }
.p-search__item.is-active { background: var(--bg-selected); }
.p-search__item-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--brand-100); color: var(--brand-700);
  display: grid; place-items: center;
  font-weight: 600; font-size: var(--fz-12);
  flex-shrink: 0;
}
.p-search__item-meta { color: var(--text-3); font-size: var(--fz-11); font-family: var(--font-mono); margin-left: auto; }
.p-search__create {
  padding: 10px; border-top: 1px solid var(--border);
  color: var(--accent);
  font-size: var(--fz-12); font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
}
.p-search__create:hover { background: var(--bg-hover); }

.selected-patient {
  padding: 12px 14px;
  background: var(--accent-soft);
  border: 1px solid var(--brand-100);
  border-radius: var(--r-3);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.selected-patient__avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--brand-500); color: #fff;
  display: grid; place-items: center;
  font-weight: 600;
  flex-shrink: 0;
}
.selected-patient__name { font-weight: 600; font-size: var(--fz-14); }
.selected-patient__meta { font-size: var(--fz-12); color: var(--brand-700); opacity: .75; font-family: var(--font-mono); }
.selected-patient__right { margin-left: auto; display: flex; align-items: center; gap: 6px; }

.form-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px 16px;
}
.form-grid .field--wide { grid-column: span 3; }
.form-grid .field--half { grid-column: span 1; }

.readonly .input, .readonly .select, .readonly .textarea {
  background: var(--n-50);
  color: var(--text-2);
}

/* --- Patient list --- */
.plist-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 32px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
}
.plist-toolbar .input-wrap { width: 320px; }
.plist-wrap {
  padding: 16px 32px 40px;
}
.plist-frame {
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  overflow: hidden;
  background: var(--bg-surface);
}
.plist-frame .tbl th { background: var(--bg-sunken); position: sticky; top: 0; }
.plist-frame .tbl tbody tr { cursor: pointer; }
.plist-frame .tbl td { height: 48px; }
.plist-frame .name-cell { display: flex; align-items: center; gap: 10px; }
.plist-frame .name-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--brand-100); color: var(--brand-700);
  display: grid; place-items: center;
  font-weight: 600; font-size: var(--fz-12);
  flex-shrink: 0;
}
.plist-frame .name-main { font-weight: 600; }
.plist-frame .name-sub { font-size: var(--fz-11); color: var(--text-4); font-family: var(--font-mono); }
.plist-frame .sum-cell { max-width: 340px; color: var(--text-2); font-size: var(--fz-12); }

/* --- Patient detail two-pane (full height) --- */
.pd-shell {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: 100%;
  min-height: 0;
}
.pd-left {
  border-right: 1px solid var(--border);
  background: var(--bg-surface);
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.pd-left__top { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); }
.pd-left__section { padding: 16px 18px; border-bottom: 1px solid var(--border); }
.pd-left__section:last-of-type { border-bottom: none; }
.pd-left__title {
  font-size: var(--fz-11);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-4);
  margin: 0 0 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.pd-left__foot {
  margin-top: auto;
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg-sunken);
  display: flex; gap: 8px;
  position: relative;
}
.more-menu {
  position: absolute;
  bottom: calc(100% + 4px); left: 12px; right: 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  box-shadow: var(--sh-pop);
  padding: 4px;
  z-index: 20;
}
.more-menu__item {
  padding: 8px 10px;
  border-radius: var(--r-2);
  font-size: var(--fz-13);
  color: var(--text-1);
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
}
.more-menu__item:hover { background: var(--bg-hover); }
.more-menu__item.is-danger { color: var(--err-500); }
.more-menu__item.is-danger:hover { background: var(--err-50); }
.more-menu__divider { height: 1px; background: var(--border); margin: 4px 0; }

.pd-right {
  min-width: 0;
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.pd-tabs-bar {
  padding: 0 32px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 5;
}
.pd-tabs-bar .tabs { flex: 1; border-bottom: none; }
.pd-tabs-bar__right { display: flex; gap: 8px; align-items: center; padding: 8px 0; }

.pd-content { padding: 20px 32px 40px; }

/* --- Disease ranked rows --- */
.disease-rank {
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  overflow: hidden;
  background: var(--bg-surface);
}
.disease-rank__row {
  display: grid;
  grid-template-columns: 36px 1fr 140px 120px 160px 24px;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: background .12s;
}
.disease-rank__row:last-child { border-bottom: none; }
.disease-rank__row:hover { background: var(--bg-hover); }
.disease-rank__row.is-selected { background: var(--bg-selected); }
.disease-rank__row.is-selected::before {
  content: ""; position: absolute;
  /* accent via parent below */
}
.disease-rank__row-wrap { position: relative; }
.disease-rank__row-wrap.is-selected::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--accent);
}
.disease-rank__name-main { font-weight: 600; font-size: var(--fz-14); display: flex; align-items: center; gap: 8px; }
.disease-rank__name-sub { font-size: var(--fz-11); color: var(--text-3); font-family: var(--font-mono); margin-top: 2px; }
.disease-rank__omim { font-size: var(--fz-11); color: var(--text-4); font-family: var(--font-mono); }

/* subtabs */
.subtabs {
  display: inline-flex;
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  padding: 3px;
  gap: 2px;
  flex-wrap: wrap;
}
.subtabs__item {
  padding: 5px 12px;
  font-size: var(--fz-12);
  font-weight: 500;
  color: var(--text-2);
  border-radius: 4px;
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: inherit;
}
.subtabs__item:hover { color: var(--text-1); }
.subtabs__item.is-active { background: var(--bg-surface); color: var(--accent); box-shadow: var(--sh-1); }

.panel {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  overflow: hidden;
}
.panel__head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  background: var(--bg-sunken);
}
.panel__title { font-size: var(--fz-13); font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px; }
.panel__body { padding: 16px; }
.panel__body--flush { padding: 0; }

/* hit badge */
.hit {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: var(--fz-11); font-weight: 600;
  padding: 2px 6px; border-radius: var(--r-2);
}
.hit--yes { background: var(--ok-50); color: var(--ok-700); }
.hit--no  { background: var(--err-50); color: var(--err-700); }
.hit--partial { background: var(--warn-50); color: var(--warn-700); }
.hit--unknown { background: var(--n-100); color: var(--text-3); }

.cite-sup {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  cursor: pointer;
  vertical-align: super;
  margin-left: 2px;
  text-decoration: none;
  border-bottom: 1px dotted var(--accent);
}

/* KPI inline (for VCF summary) */
.kpi-inline {
  display: flex; align-items: stretch;
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  background: var(--bg-surface);
  overflow: hidden;
}
.kpi-inline__item {
  flex: 1;
  padding: 12px 18px;
  border-right: 1px solid var(--border);
  position: relative;
}
.kpi-inline__item:last-child { border-right: none; }
.kpi-inline__label {
  font-size: var(--fz-11);
  color: var(--text-4);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 2px;
}
.kpi-inline__val {
  font-size: var(--fz-24);
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
}
.kpi-inline__sub { font-size: var(--fz-11); color: var(--text-3); font-family: var(--font-mono); }
.kpi-inline__item--accent .kpi-inline__val { color: var(--accent); }
.kpi-inline__arrow {
  position: absolute;
  right: -8px; top: 50%;
  transform: translateY(-50%);
  z-index: 2;
  width: 16px; height: 16px;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  background: var(--bg-surface);
  transform: translateY(-50%) rotate(45deg);
}
.kpi-inline__item:last-child .kpi-inline__arrow { display: none; }

/* Variant table */
.vtable {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: var(--fz-13);
}
.vtable th, .vtable td {
  padding: 8px 10px;
  text-align: left;
  vertical-align: middle;
  border-bottom: 1px solid var(--border-subtle);
  line-height: 1.3;
  white-space: nowrap;
}
.vtable th {
  background: var(--bg-sunken);
  color: var(--text-3);
  font-weight: 600;
  font-size: var(--fz-11);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
}
.vtable tbody tr { background: var(--bg-surface); }
.vtable tbody tr:hover { background: var(--bg-hover); }
.vtable tbody tr.is-expanded { background: var(--bg-selected); }
.vtable tbody tr.vtable__head { background: var(--bg-sunken); }
.vtable tbody tr.vtable__head:hover { background: var(--bg-sunken); }
.vtable tbody tr.vtable__head th { position: static; }
.vtable .mono { font-family: var(--font-mono); font-size: var(--fz-12); }
.vtable .expander {
  display: inline-grid; place-items: center;
  width: 18px; height: 18px;
  border-radius: 3px;
  color: var(--text-3);
  cursor: pointer;
}
.vtable tr.is-expanded .expander { transform: rotate(90deg); color: var(--accent); }
.vtable__section {
  background: var(--n-50);
  padding: 8px 14px;
  font-size: var(--fz-11);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-3);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.vtable__section .count { font-family: var(--font-mono); color: var(--text-2); }

.vdetail {
  padding: 16px 22px;
  background: var(--bg-sunken);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

/* running stage card */
.stage-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  overflow: hidden;
  margin-bottom: 18px;
}
.stage-card__head {
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  gap: 12px;
}
.stage-card__num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--n-150);
  color: var(--text-3);
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-mono);
  display: grid; place-items: center;
}
.stage-card.is-done .stage-card__num { background: var(--ok-500); color: #fff; }
.stage-card.is-active .stage-card__num { background: var(--accent); color: #fff; }
.stage-card__title { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: var(--fz-14); }
.stage-card__body { padding: 0; }
.stage-card--collapsed .stage-card__body { display: none; }

.reasoning-steps {
  display: grid; grid-template-columns: 1fr; gap: 0;
}
.reasoning-step {
  display: grid;
  grid-template-columns: 28px 1fr 120px 60px;
  gap: 14px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border-subtle);
  font-size: var(--fz-13);
  align-items: center;
}
.reasoning-step:last-child { border-bottom: none; }
.reasoning-step__icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--n-150);
  color: var(--text-3);
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
}
.reasoning-step.is-done .reasoning-step__icon { background: var(--ok-500); color: #fff; }
.reasoning-step.is-running .reasoning-step__icon { background: var(--accent); color: #fff; position: relative; }
.reasoning-step.is-running .reasoning-step__icon::after {
  content: ""; position: absolute; inset: -3px;
  border: 2px solid var(--accent);
  border-radius: 50%; opacity: .4;
  animation: pulse-ring 1.6s ease-out infinite;
}
.reasoning-step__name { font-weight: 600; }
.reasoning-step.is-queue .reasoning-step__name { color: var(--text-3); font-weight: 500; }
.reasoning-step__meta { font-size: var(--fz-12); color: var(--text-3); margin-top: 2px; }
.reasoning-step__t { font-family: var(--font-mono); font-size: var(--fz-12); color: var(--text-4); text-align: right; }
.reasoning-step__status { font-size: var(--fz-11); text-align: right; }

.live-log {
  background: var(--n-900);
  color: #CBD2E0;
  font-family: var(--font-mono);
  font-size: var(--fz-11);
  padding: 12px 16px;
  line-height: 1.7;
  max-height: 160px;
  overflow-y: auto;
}
.live-log__line { display: flex; gap: 10px; }
.live-log__t { color: #6C7793; }

/* HPO confirm list */
.hpo-bag {
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  background: var(--bg-sunken);
  padding: 10px;
  min-height: 100px;
  display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start;

/* history timeline */
.hist-list {
  display: flex; flex-direction: column; gap: 0;
}
.hist-item {
  display: grid;
  grid-template-columns: 64px 1fr 120px;
  gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-subtle);
  align-items: start;
}
.hist-item:last-child { border-bottom: none; }
.hist-item__type {
  font-family: var(--font-mono);
  font-size: var(--fz-11);
  font-weight: 700;
  padding: 3px 8px;
  border-radius: var(--r-2);
  text-align: center;
  letter-spacing: 0.04em;

.hist-item__type--HPO { background: var(--accent-soft); color: var(--brand-700); }
.hist-item__type--VCF { background: var(--acmg-vus-bg); color: var(--acmg-vus-fg); }
.hist-item__title { font-weight: 600; font-size: var(--fz-13); margin-bottom: 3px; }
.hist-item__summary { font-size: var(--fz-12); color: var(--text-2); line-height: 1.55; }
.hist-item__meta { font-size: var(--fz-11); color: var(--text-4); font-family: var(--font-mono); margin-top: 3px; }
.hist-item__right { text-align: right; font-family: var(--font-mono); font-size: var(--fz-11); color: var(--text-4); }

/* overlay */
.overlay {
  position: fixed; inset: 0;
  background: rgba(20,25,34,.48);
  display: grid; place-items: center;
  z-index: 100;
  animation: fade-in .15s ease-out;
}
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

/* chip group for filter */
.chip-group { display: inline-flex; gap: 6px; flex-wrap: wrap; }
.chip {
  padding: 3px 10px;
  font-size: var(--fz-12);
  font-weight: 500;
  color: var(--text-2);
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  cursor: pointer;
}
.chip.is-active { background: var(--accent-soft); color: var(--accent); border-color: var(--brand-200); }

/* misc */
.sep { height: 1px; background: var(--border); margin: 14px 0; }
.soft-list { display: flex; flex-direction: column; gap: 6px; font-size: var(--fz-13); }
.soft-list > div { padding: 8px 10px; border-left: 2px solid var(--border-strong); }
.soft-list.is-confirm > div { border-left-color: var(--ok-500); background: var(--ok-50); }
.soft-list.is-follow > div  { border-left-color: var(--info-500); background: var(--info-50); }

.scroll-area { overflow-y: auto; }

/* animations */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.running-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: var(--fz-11); font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--r-pill);
  background: linear-gradient(90deg, var(--info-50), #E7F1FA, var(--info-50));
  background-size: 200% 100%;
  animation: shimmer 2.4s linear infinite;
  color: var(--info-700);
}
.running-pill .spinner { border-color: var(--info-100, #BFDBF7); border-top-color: var(--info-500); width: 10px; height: 10px; border-width: 1.5px; }

/* avatar helpers */
.mini-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--brand-100); color: var(--brand-700);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
  flex-shrink: 0;

/* dialog wide variant (for history overlay) */
.dialog--wide { width: min(1100px, 94vw) !important; max-height: 86vh; display: flex; flex-direction: column; }
.dialog--wide .dialog__body { flex: 1; overflow: auto; padding: 0; }
.dialog--wide .dialog__head { padding: 14px 20px; border-bottom: 1px solid var(--border); }
.pd-back-btn { padding: 10px 16px 0; }

</style>
</head>

<script type="text/babel">/* global React */

const Btn = ({ variant = "secondary", size, icon, children, ...p }) => (

const Badge = ({ tone = "neutral", dot, pill, children }) => {
  const cls = ["badge"];
  if (pill) cls.push("badge--pill");
  if (dot) cls.push("badge--dot");
  const toneMap = { brand:"soft-brand", ok:"soft-ok", warn:"soft-warn", err:"soft-err", info:"soft-info", outline:"outline" };
  if (toneMap[tone]) cls.push(`badge--${toneMap[tone]}`);
  return <span className={cls.join(" ")}>{children}</span>;
};

const Acmg = ({ k }) => {
  const map = { P:["p","P"], LP:["lp","LP"], VUS:["vus","VUS"], LB:["lb","LB"], B:["b","B"] };
  const [cls, label] = map[k] || ["vus","VUS"];
  return <span className={`acmg acmg--${cls}`}>{label}</span>;
};

const Hpo = ({ id, label, neg, removable = true }) => (
  <span className={`hpo${neg ? " hpo--neg" : ""}`}>

    <span className="hpo__label">{label}</span>

const StatusDot = ({ kind = "queue", children }) => (
  <span className={`status status--${kind}`}>
    <span className="status__dot"/>{children}

);

const Progress = ({ value = 40, tone, size, striped }) => {
  const cls = ["progress"];
  if (tone) cls.push(`progress--${tone}`);
  if (size) cls.push(`progress--${size}`);
  if (striped) cls.push("progress--striped");
  return <div className={cls.join(" ")}><div className="progress__fill" style={{width: `${value}%`}}/></div>;
};

const MatchBar = ({ value }) => (
  <div className="match-bar">

);

<script type="text/babel">/* global React, Btn, Badge, StatusDot, IconSearch, IconFilter, IconPlus, IconChevron, PATIENTS */
const { useState: useStateB, useMemo: useMemoB } = React;

function PageList({ setRoute }) {
  const [q, setQ] = useStateB("");
  const [sortKey, setSortKey] = useStateB("lastAt");
  const [sortDir, setSortDir] = useStateB("desc");
  const [statusFilter, setStatusFilter] = useStateB("all");

  const rows = useMemoB(() => {
    let arr = PATIENTS.slice();
    if (q) {
      const qq = q.toLowerCase();
      arr = arr.filter(p => p.name.includes(q) || p.id.toLowerCase().includes(qq) || p.summary.toLowerCase().includes(qq));
    }
    if (statusFilter !== "all") arr = arr.filter(p => p.status === statusFilter);
    arr.sort((a,b) => {
      const av = a[sortKey] || ""; const bv = b[sortKey] || "";
      if (av < bv) return sortDir === "asc" ? -1 : 1;
      if (av > bv) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
    return arr;
  }, [q, sortKey, sortDir, statusFilter]);

  const toggleSort = (k) => {
    if (sortKey === k) setSortDir(sortDir === "asc" ? "desc" : "asc");
    else { setSortKey(k); setSortDir("desc"); }
  };
  const sortCls = (k) => "is-sort" + (sortKey === k ? (sortDir === "asc" ? " is-asc" : " is-desc") : "");

  const statusMap = {
    diagnosed: { tone: "ok", label: "已确诊" },
    running:   { tone: "info", label: "诊断中" },
    review:    { tone: "warn", label: "待复核" },
    failed:    { tone: "err", label: "失败" },
  };

  return (
    <>

        </div>
        <div className="chip-group">
          {[["all","全部"],["diagnosed","已确诊"],["running","诊断中"],["review","待复核"],["failed","失败"]].map(([k,l]) => (
            <button key={k} className={"chip" + (statusFilter === k ? " is-active" : "")} onClick={() => setStatusFilter(k)}>{l}</button>
          ))}
        </div>
        <div style={{marginLeft:"auto", fontSize:"var(--fz-12)", color:"var(--text-3)"}}>
          显示 <b>{rows.length}</b> / {PATIENTS.length}
        </div>

              {rows.map(p => {

                  <tr key={p.id} onClick={() => setRoute({ view: "patient", id: p.id, tab: p.id === HERO_PATIENT.id ? "hpo" : "hpo", sub: p.status === "running" ? "running" : "done" })}>

                      <div className="name-cell">
                        <div className="name-avatar">{p.name.slice(-1)}</div>

                      </div>
                    </td>
                    <td><div className="sum-cell">{p.summary}</div></td>
                    <td className="num">{p.hpoCount}</td>
                    <td className="num">{p.vcfCount}</td>
                    <td className="mono" style={{color:"var(--text-2)"}}>{p.lastAt}</td>

                    </td>

            </tbody>
          </table>
        </div>
      </div>
    </>
  );
}

Object.assign(window, { PageList });

   HPO · 诊断进行中 (page D)

  const [stage, setStage] = useStateP(3); // 1,2,3 active
  const [hpoList, setHpoList] = useStateP(r.stage2.extracted);

  const removeHpo = (id) => setHpoList(hpoList.filter(h => h.id !== id));

  return (
    <>
      {/* overall stepper */}
      <div className="stepper" style={{marginBottom:18}}>

          const cls = n < stage ? "is-done" : n === stage ? "is-active" : "";
          return (
            <div key={i} className={"stepper__item " + cls}>
              <div className="stepper__label">
                <span className="stepper__num">{n}</span>

        <div className="stage-card__body" style={{padding:"14px 18px"}}>
          <div className="chat">
            {r.stage1.messages.slice(-4).map((m, i) => (
              <div key={i} className={"chat__msg chat__msg--" + m.from}>
                <div className={"chat__avatar chat__avatar--" + m.from}>{m.from === "ai" ? "AI" : "我"}</div>
                <div className="chat__bubble">
                  {m.text}
                  {m.refs && m.refs.map((x,j) => <a key={j} className="cite-sup">[{x.n}]</a>)}

              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Stage 2 */}
      <div className={"stage-card " + (stage > 2 ? "is-done" : stage === 2 ? "is-active" : "")}>
        <div className="stage-card__head">
          <div className="stage-card__title">
            <span className="stage-card__num">2</span>
            HPO 清单确认

              <span key={h.id} className={"hpo" + (h.neg ? " hpo--neg" : "")}>

                <span className="hpo__x" onClick={() => removeHpo(h.id)}><IconX/></span>

      </div>

      {/* Stage 3 */}
      <div className={"stage-card " + (stage === 3 ? "is-active" : "")}>

          <div className="stage-card__title">
            <span className="stage-card__num">3</span>

          </div>
